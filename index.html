<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QHP - Authentication Gateway</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>
<body class="bg-slate-900 font-sans antialiased">
  <div class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-blue-950 via-blue-900 to-orange-950 relative overflow-hidden">
    
    <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-blue-600/20 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-orange-600/15 rounded-full blur-[120px]"></div>

    <!-- LOGIN CARD -->
    <div id="login-card" class="w-full max-w-md bg-white/95 backdrop-blur-xl shadow-2xl rounded-3xl overflow-hidden">
      <div class="bg-gradient-to-r from-blue-50 via-white to-orange-50 p-6 border-b">
        <div class="flex justify-between items-start">
          <div>
            <h1 class="text-4xl font-extrabold text-blue-900">QHP</h1>
            <p class="text-xs font-bold text-orange-500 mt-1">Quick Helping Partner</p>
          </div>
        </div>
      </div>

      <div class="p-8">
        <h2 class="text-2xl font-bold mb-6">Login or Signup</h2>

        <form id="phone-form" class="space-y-6">
          <div class="flex border-2 border-gray-200 rounded-xl overflow-hidden">
            <div class="bg-gray-50 px-4 py-4 border-r text-lg font-semibold">+91</div>
            <input type="tel" id="phone" maxlength="10" placeholder="9876543210" 
                   class="flex-1 p-4 outline-none text-lg" required>
          </div>
          <button type="submit" id="send-otp-btn" 
                  class="w-full bg-blue-700 hover:bg-blue-800 text-white py-4 rounded-xl font-bold text-lg">
            Send OTP
          </button>
        </form>

        <div class="my-6 text-center text-sm text-gray-400">OR</div>

        <button id="google-btn" 
                class="w-full bg-white border border-gray-300 hover:bg-gray-50 py-4 rounded-xl flex items-center justify-center gap-3 font-semibold text-lg">
          <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" class="h-5">
          Continue with Google
        </button>
      </div>
    </div>

    <!-- OTP CARD -->
    <div id="otp-card" class="w-full max-w-md bg-white/95 backdrop-blur-xl shadow-2xl rounded-3xl hidden">
      <div class="p-8">
        <button id="back-btn" class="mb-4 text-blue-600">← Back</button>
        <h2 class="text-2xl font-bold mb-2">Enter OTP</h2>
        <p class="text-gray-600 mb-6">Sent to <span id="show-phone" class="font-bold"></span></p>

        <form id="otp-form">
          <input type="text" id="otp-input" maxlength="6" placeholder="123456" 
                 class="w-full text-center text-4xl tracking-widest border-2 border-gray-300 rounded-xl p-6 focus:border-blue-600 outline-none">
          <button type="submit" id="verify-btn" 
                  class="mt-6 w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-xl font-bold text-lg">
            Verify & Login
          </button>
        </form>
      </div>
    </div>
  </div>

  <script>
    // Your Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyBmpMa0OSHIzKKGgqFN7LIKpp6OlCalWWA",
      authDomain: "qhrlogin.firebaseapp.com",
      projectId: "qhrlogin",
      storageBucket: "qhrlogin.firebasestorage.app",
      messagingSenderId: "800351300218",
      appId: "1:800351300218:web:500aaf4ed360cddfdfe9c3",
      measurementId: "G-DB845KTJH2"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    let confirmationResult = null;

    // Google Login
    document.getElementById('google-btn').addEventListener('click', () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider)
        .then((result) => {
          alert("✅ Google Login Successful!");
          window.location.href = "https://saisandeep647.github.io/qhp/userdashboard1";
        })
        .catch((error) => alert("Google Login Failed: " + error.message));
    });

    // Phone Login
    document.getElementById('phone-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const phone = "+91" + document.getElementById('phone').value.trim();
      if (phone.length !== 13) return alert("Invalid number");

      document.getElementById('show-phone').textContent = phone;

      try {
        confirmationResult = await auth.signInWithPhoneNumber(phone, new firebase.auth.RecaptchaVerifier('recaptcha-container', {size: 'invisible'}));
        document.getElementById('login-card').classList.add('hidden');
        document.getElementById('otp-card').classList.remove('hidden');
      } catch (err) {
        alert("Failed to send OTP: " + err.message);
      }
    });

    // Verify OTP
    document.getElementById('otp-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const code = document.getElementById('otp-input').value;
      try {
        await confirmationResult.confirm(code);
        alert("✅ Login Successful!");
        window.location.href = "https://saisandeep647.github.io/qhp/userdashboard1";
      } catch (err) {
        alert("Invalid OTP. Try again.");
      }
    });

    // Back Button
    document.getElementById('back-btn').addEventListener('click', () => {
      document.getElementById('otp-card').classList.add('hidden');
      document.getElementById('login-card').classList.remove('hidden');
    });
  </script>
</body>
</html>
